# Strategy: trend_breakout_v2
# Inherits all shared settings from base_config.yaml
# Usage: python main.py --config config/crypto_config.yaml backtest --data data/btc_4h.csv --symbol BTCUSDT

strategy:
  name: "trend_breakout_v2"
  strategy_name: "trend_breakout_v2"

  indicators:
    strategy_name: "trend_breakout_v2"
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    adx_period: 14
    adx_threshold: 22
    atr_period: 14
    channel_period: 20
    atr_filter_lookback: 50

  exit:
    exit_mode: "trend_following"
    initial_stop_atr_multiple: 2.5
    trailing_stop_atr_multiple: 4.0
