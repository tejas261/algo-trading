# Strategy: donchian_trend_55
# Inherits all shared settings from base_config.yaml
# Usage: python main.py --config config/crypto_donchian_config.yaml backtest --data data/btc_4h.csv --symbol BTCUSDT

strategy:
  name: "donchian_trend_55"
  strategy_name: "donchian_trend_55"

  indicators:
    strategy_name: "donchian_trend_55"
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    adx_period: 14
    atr_period: 14
    channel_period: 20
    atr_filter_lookback: 50

  exit:
    exit_mode: "donchian"
    initial_stop_atr_multiple: 2.5
    trailing_stop_atr_multiple: 4.0
