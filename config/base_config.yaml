# ============================================================
# Base config — shared settings for all strategies
# Change values HERE; strategy configs only override strategy-specific fields.
# ============================================================

# -- Common settings (change these before backtesting) --
common:
  symbol: "BTCUSDT"
  # symbol: "ETHUSDT"
  timeframe: "4h"
  initial_capital: 10000.0
  currency: "USDT"
  market_type: "crypto" # crypto | equity
  instrument_type: "perpetual" # spot | perpetual
  leverage: 2.0

app:
  name: "AlgoTrader"
  mode: "backtest"
  log_level: "INFO"

data:
  source: "csv"
  gap_detection: "warn" # warn | fail | ignore

execution:
  adapter: "paper"
  dry_run: true

# -- Risk management --
risk:
  risk_per_trade_pct: 0.75
  leverage: 2.0
  max_trades_per_day: 2
  consecutive_loss_stop: 3
  cooldown_candles_after_stopout: 3
  risk_window_mode: "rolling_24h" # rolling_24h | calendar_day
  risk_window_hours: 24
  atr_volatility_filter:
    enabled: true
    max_atr_ratio: 1.5
    rolling_window: 50
  live_controls:
    max_daily_drawdown_pct: 3.0
    max_exposure_pct: 100.0
    kill_switch: false
    circuit_breaker:
      max_consecutive_rejections: 3
      max_slippage_bps: 50
      slippage_window_trades: 5

# -- Instrument specification --
instrument:
  min_notional: 10.0
  min_qty: 0.00001
  qty_step: 0.00001
  price_tick: 0.01
  assumed_daily_volume: 1000000000.0

# -- Perpetual futures settings --
perpetual:
  initial_margin_fraction: 0.5 # 1 / leverage
  maintenance_margin_fraction: 0.005
  liquidation_fee_bps: 50
  funding_mode: "regime_approx" # constant | series | regime_approx
  funding_bps_per_8h: 1.0
  enable_funding_costs: true

# -- Cost model (Binance-like fees) --
paper:
  cost_model:
    maker_fee_bps: 1.0
    taker_fee_bps: 1.0
    base_slippage_bps: 3.0
    volatility_slippage_multiplier: 1.0
    size_slippage_multiplier: 0.5
    stress_slippage_multiplier: 1.5
    liquidation_slippage_multiplier: 2.0
    min_slippage_bps: 1.0
    max_slippage_bps: 100.0
    tax_bps: 0.0
    funding_bps_per_8h: 1.0
